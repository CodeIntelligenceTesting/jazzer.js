name: "🔍 Tests Main"
on:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  tests:
    name: tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node: [20]
        include:
          # Floor: legacy compatibility check
          - os: ubuntu-latest
            node: 14
          # Ceiling: current LTS
          - os: ubuntu-latest
            node: 24
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - uses: actions/cache@v3
        id: cache-fuzzer
        with:
          path: |
            packages/fuzzer/prebuilds
          key:
            fuzzer-cache-${{ matrix.os }}-${{
            hashFiles('packages/fuzzer/CMakeLists.txt',
            'packages/fuzzer/**/*.h', 'packages/fuzzer/**/*.cpp') }}
      - name: node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - name: MSVC (windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: contains(matrix.os, 'windows')
      - name: install dependencies
        run: npm ci
      - name: build project
        run: npm run build
      - name: build fuzzer
        if: ${{ steps.cache-fuzzer.outputs.cache-hit != 'true' }}
        run: npm run build --workspace=@jazzer.js/fuzzer
      - name: run all tests
        run: npm run test
  fuzz_tests:
    name: fuzz tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - uses: actions/cache@v3
        id: cache-fuzzer
        with:
          path: |
            packages/fuzzer/prebuilds
          key:
            fuzzer-cache-${{ runner.os }}-${{
            hashFiles('packages/fuzzer/CMakeLists.txt',
            'packages/fuzzer/**/*.h', 'packages/fuzzer/**/*.cpp') }}
      - name: node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"
      - name: install dependencies
        run: npm ci
      - name: build project
        run: npm run build
      - name: build fuzzer
        if: ${{ steps.cache-fuzzer.outputs.cache-hit != 'true' }}
        run: npm run build --workspace=@jazzer.js/fuzzer
      - name: run all fuzz tests
        run: node fuzztests/runFuzzTests.js
  end-to-end:
    name: end-to-end
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      # Build with node.js 22
      - name: node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"
      - name: pack jazzer.js
        run: cd end-to-end && ./package-jazzer-js.sh
      - name: build example
        run: cd end-to-end && npm install --save-dev *.tgz && npm run build

      # Run with different node.js versions
      # all in one job to avoid rebuilding
      - name: "node 14"
        uses: actions/setup-node@v3
        with:
          node-version: 14
          cache: "npm"
      - name: run tests
        run: cd end-to-end && npx jest

      - name: "node 20"
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
      - name: run tests
        run: cd end-to-end && npx jest

      - name: "node 24"
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "npm"
      - name: run tests
        run: cd end-to-end && npx jest
