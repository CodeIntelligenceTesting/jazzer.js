name: "🔍 Tests PR"
on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  linting:
    name: lint
    runs-on: ubuntu-20.04
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: node
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: "npm"
      - name: install dependencies
        run: npm ci
      - name: install dependencies with apt
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo apt-get install software-properties-common
          sudo add-apt-repository 'deb http://apt.llvm.org/focal/ llvm-toolchain-focal-16 main'
          sudo apt-get install clang-tidy-16
          sudo rm -f /usr/bin/clang-tidy
          sudo ln -s /usr/bin/clang-tidy-16 /usr/bin/clang-tidy
      - name: build project
        # Build project so that imports can be checked during linting
        run: npm run build
      - name: build fuzzer
        # Build the native addon so that CMake downloads libFuzzer and
        # generates compile_commands.json, which are needed by clang-tidy
        run: npm run build --workspace=@jazzer.js/fuzzer
      - name: check formatting and linting
        run: npm run check
  tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2019, selfhosted-macos, ubuntu-20.04]
        # Test only latest LTS version in PRs
        node: [20]
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - uses: actions/cache@v3
        id: cache-fuzzer
        with:
          path: |
            packages/fuzzer/prebuilds
          key:
            fuzzer-cache-${{ runner.os }}-${{
            hashFiles('packages/fuzzer/CMakeLists.txt',
            'packages/fuzzer/**/*.h', 'packages/fuzzer/**/*.cpp') }}
      - name: node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - name: MSVC (windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: contains(matrix.os, 'windows')
      - name: install dependencies
        run: npm ci
      - name: build project
        run: npm run build
      - name: build fuzzer
        # TODO: fix me, because cache does not seem to work
        #if: ${{ steps.cache-fuzzer.outputs.cache-hit != 'true' }}
        run: npm run build --workspace=@jazzer.js/fuzzer
      - name: run all tests
        run: npm run test
  auto-merge:
    needs:
      - linting
      - tests
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-20.04
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1.3.6
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Approve
        if:
          ${{steps.metadata.outputs.update-type !=
          'version-update:semver-major'}}
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Enable auto-merge
        if:
          ${{steps.metadata.outputs.update-type !=
          'version-update:semver-major'}}
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
